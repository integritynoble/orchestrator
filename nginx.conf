server {
    listen 80;
    server_name orche.platformai.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name orche.platformai.org;

    ssl_certificate /etc/letsencrypt/live/orche.platformai.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orche.platformai.org/privkey.pem;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Frontend (built static files served by FastAPI, or Vite preview)
    location / {
        proxy_pass http://127.0.0.1:4173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
